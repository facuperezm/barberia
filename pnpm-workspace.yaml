peerDependencyRules:
  allowedVersions:
    # better-auth's `better-call` declares a strict zod ^4 peer, but zod 3.25.x
    # ships the v4 API (`zod/v4`) and better-auth officially supports zod 3.25+.
    # Allow zod 3 here instead of a disproportionate full zod v4 migration.
    "better-call>zod": "3"
