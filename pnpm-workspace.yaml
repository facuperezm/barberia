  # ReDoS in picomatch via tailwindcss build chain (GHSA-c2c7-rcm5-vvqj).
  # Two transitive lines: chokidarâ†’anymatch uses 2.x, sucraseâ†’tinyglobby uses 4.x.
  "picomatch@2": "^2.3.2"
  "picomatch@4": "^4.0.4"
  # uuid ReDoS pulled in transitively by mercadopago (only patched in >=11.1.1).
  "uuid@9": "11.1.1"
  # postcss ReDoS (GHSA-qx2v-qp2m-jg93) â€” Next bundles its own pre-8.5.10 copy.
